# Dependency update automation. Prior to this the repo had no Dependabot /
# Renovate and no `npm audit` gate, so advisories (e.g. the undici HIGH
# advisories pulled in transitively via @vercel/node) sat unsurfaced. Weekly
# npm + github-actions checks, with minor/patch bumps grouped to keep PR noise
# low; majors still open individually so they get a deliberate review.
#
# Both ecosystems run on the shared Monday 06:00 UTC weekly sweep slot so all
# robot output lands together on Monday morning.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    assignees:
      - jbhirsh
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    groups:
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
  - package-ecosystem: github-actions
    directory: "/"
    assignees:
      - jbhirsh
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
