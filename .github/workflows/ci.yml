name: CI

# Lint, type-check and unit tests on every PR to main. smoke.yml/visual.yml
# only exercise the deployed preview, so without this job the Vitest suite,
# ESLint and tsc never gate a PR (they ran only transitively in Vercel's build).
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # legacy-peer-deps is set in .npmrc; pass it explicitly too, mirroring
      # visual.yml, so the install is deterministic regardless of npm defaults.
      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      # The typed GraphQL operations in src/gql/ are generated from the SDL in
      # api/_schema.ts. Regenerate and fail if the checked-in output drifts, so
      # a schema change that wasn't re-codegen'd can't merge.
      - name: GraphQL codegen drift
        run: npm run codegen && git diff --exit-code src/gql/

      - name: Unit tests + coverage
        run: npm run test:coverage

      # Catch build-only breakage (e.g. Vercel's cache-free tsc surfacing errors
      # a warm local build hides) before merge, not after deploy.
      - name: Build
        run: npx vite build
